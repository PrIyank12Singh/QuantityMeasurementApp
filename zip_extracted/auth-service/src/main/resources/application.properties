spring.application.name=auth-service
server.port=${PORT:8081}

# ── H2 Database ────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ── Eureka ─────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://<YOUR_RENDER_DISCOVERY_SERVICE_URL>/eureka/}
eureka.instance.prefer-ip-address=true

# ── JWT ────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── Google OAuth ───────────────────────────────────────────────────
app.google.client-id=${GOOGLE_CLIENT_ID:481397534301-3r9dl62f6m2ij565i79463d5276ig2oh.apps.googleusercontent.com}

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
