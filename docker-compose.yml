version: '3.8'

services:
  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      - PORT=8761
      - EUREKA_HOSTNAME=discovery-service
    networks:
      - quantity-app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_URL=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1
      - DB_USERNAME=sa
      - DB_PASSWORD=
      - EUREKA_URL=http://discovery-service:8761/eureka/
      - JWT_SECRET=dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n
      - JWT_EXPIRATION_MS=3600000
      - GOOGLE_CLIENT_ID=481397534301-3r9dl62f6m2ij565i79463d5276ig2oh.apps.googleusercontent.com
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/auth/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - quantity-app-network

  quantity-service:
    build:
      context: ./quantity-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DB_URL=jdbc:h2:mem:quantitydb;MODE=MySQL;DB_CLOSE_DELAY=-1
      - DB_USERNAME=sa
      - DB_PASSWORD=
      - EUREKA_URL=http://discovery-service:8761/eureka/
    depends_on:
      discovery-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/quantity/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - quantity-app-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - EUREKA_URL=http://discovery-service:8761/eureka/
      - ALLOWED_ORIGINS=http://localhost:4200
    depends_on:
      discovery-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      quantity-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - quantity-app-network

networks:
  quantity-app-network:
    driver: bridge