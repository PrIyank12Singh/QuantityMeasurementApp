spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "https://quantity-measurement-app-frontend-topaz.vercel.app"
            
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true

      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:lb://AUTH-SERVICE}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallback: /fallback/auth

        - id: quantity-service-actuator
          uri: ${QUANTITY_SERVICE_URL:lb://QUANTITY-SERVICE}
          predicates:
            - Path=/api/quantity/actuator/**
          filters:
            - name: CircuitBreaker
              args:
                name: quantityActuatorCircuitBreaker

        - id: quantity-service
          uri: ${QUANTITY_SERVICE_URL:lb://QUANTITY-SERVICE}
          predicates:
            - Path=/api/quantity/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: quantityCircuitBreaker
                fallback: /fallback/quantity

    httpclient:
      connect-timeout: 15000
      response-timeout: 15000

    loadbalancer:
      ribbon:
        enabled: false

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone:  https://eurekaservice-qgjc.onrender.com/eureka/
    registry-fetch-interval-seconds: 10
    instance-info-replication-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 40
    fetch-registry: true
    register-with-eureka: true
    connect-timeout-ms: 15000
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n

# ── Response Headers & Security ────────────────────────────────────
spring.cloud.gateway.filter.remove-hop-by-hop.headers: Connection,Keep-Alive,Proxy-Authenticate,Proxy-Authorization,TE,Trailers,Transfer-Encoding,Upgrade
spring.cloud.gateway.globalcors.corsConfigurations['/**'].maxAge: 3600
spring.cloud.gateway.globalcors.corsConfigurations['/**'].allowedHeaders: '*'

# ── Custom Response Headers (COOP, Security, Performance) ──────────
spring.cloud.gateway.default-filters:
  - RemoveRequestHeader=Connection
  - RemoveRequestHeader=Keep-Alive
  - AddResponseHeader=Cross-Origin-Opener-Policy,same-unsafe-none
  - AddResponseHeader=Cross-Origin-Embedder-Policy,unsafe-none
  - AddResponseHeader=X-Content-Type-Options,nosniff
  - AddResponseHeader=X-Frame-Options,DENY
  - AddResponseHeader=X-XSS-Protection,1; mode=block
  - AddResponseHeader=Cache-Control,no-cache,no-store,must-revalidate

# ── Connection Pool & Timeouts ────────────────────────────────────
spring.cloud.gateway.httpserver.wiretap: false
spring.webflux.httpclient.connectTimeout: 5000
spring.webflux.httpclient.pendingAcquireTimeout: 5000
spring.webflux.httpclient.pendingAcquireMaxCount: -1
spring.webflux.httpclient.maxLifeTime: 30000
spring.webflux.httpclient.maxIdleTime: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info

# ── Circuit Breaker Configuration ──────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      authCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5000
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 6000
      quantityCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5000
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 6000
      quantityActuatorCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        waitDurationInOpenState: 2000
        failureRateThreshold: 30

  timelimiter:
    instances:
      authCircuitBreaker:
        cancelRunningFuture: false
        timeoutDuration: 60000
      quantityCircuitBreaker:
        cancelRunningFuture: false
        timeoutDuration: 60000
      quantityActuatorCircuitBreaker:
        cancelRunningFuture: false
        timeoutDuration: 5000

---
spring:
  config:
    activate:
      on-profile: production

eureka:
  client:
    enabled: true
    service-url: https://eurekaservice-qgjc.onrender.com/eureka/

server:
  port: ${PORT:8080}