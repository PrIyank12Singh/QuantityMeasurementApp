# Production Profile - Render.com Deployment

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false
      
      # Load balancer URIs for Eureka service discovery, with optional direct URL fallback
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:lb://AUTH-SERVICE}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker

        - id: quantity-service
          uri: ${QUANTITY_SERVICE_URL:lb://QUANTITY-SERVICE}
          predicates:
            - Path=/api/quantity/**
          filters:
            - JwtAuthFilter
            - name: CircuitBreaker
              args:
                name: quantityCircuitBreaker

eureka:
  client:
    enabled: true
  instance:
    hostname: ${RENDER_EXTERNAL_HOSTNAME:localhost}
    non-secure-port-enabled: false
    secure-port-enabled: true
    secure-port: 443

server:
  port: ${PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF
    org.springframework.cloud: INFO
