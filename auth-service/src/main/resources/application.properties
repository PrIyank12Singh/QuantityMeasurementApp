spring.application.name=auth-service
server.port=${PORT:8081}

# ── H2 Database ────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ── Eureka ─────────────────────────────────────────────────────────
eureka.client.enabled=${EUREKA_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=${EUREKA_ENABLED:false}
eureka.client.register-with-eureka=${EUREKA_ENABLED:false}
eureka.client.registry-fetch-interval-seconds=10
eureka.client.instance-info-replication-interval-seconds=30
eureka.client.initial-instance-info-replication-interval-seconds=40
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ── JWT ────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ── Google OAuth ───────────────────────────────────────────────────
app.google.client-id=${GOOGLE_CLIENT_ID:481397534301-3r9dl62f6m2ij565i79463d5276ig2oh.apps.googleusercontent.com}

# ── CORS ───────────────────────────────────────────────────────────
spring.web.cors.allowed-origins=http://localhost:4200,https://quantity-measurement-app-frontend-topaz.vercel.app
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ── Response Headers ───────────────────────────────────────────────
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax

# ── Connection Pool ────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
