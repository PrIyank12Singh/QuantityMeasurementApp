# Production Profile for Auth Service

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: false

server:
  port: ${PORT:8081}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  servlet:
    session:
      cookie:
        http-only: true
        secure: true
        same-site: lax

eureka:
  client:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF
    org.springframework.cloud: INFO
