services:
  - type: web
    name: api-gateway
    env: docker
    dockerfilePath: ./api-gateway/Dockerfile
    healthCheckPath: /actuator/health
    healthCheckTimeout: 30
    autoDeploy: true
    environmentSlug: jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://eureka.onrender.com/eureka/
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  - type: web
    name: auth-service
    env: docker
    dockerfilePath: ./auth-service/Dockerfile
    healthCheckPath: /api/auth/ping
    healthCheckTimeout: 30
    autoDeploy: true
    environmentSlug: jar
    envVars:
      - key: PORT
        value: 8081
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://eureka.onrender.com/eureka/
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

  - type: web
    name: quantity-service
    env: docker
    dockerfilePath: ./quantity-service/Dockerfile
    healthCheckPath: /api/quantity/actuator/health
    healthCheckTimeout: 30
    autoDeploy: true
    environmentSlug: jar
    envVars:
      - key: PORT
        value: 8082
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: EUREKA_ENABLED
        value: "true"
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://eureka.onrender.com/eureka/
