spring.application.name=quantity-measurement-app

server.port=${PORT:8080}

# ── H2 In-Memory DB ────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ────────────────────────────────────────────────────────────
app.jwt.secret=${APP_JWT_SECRET:dGhpcy1pcy1hLXZlcnktc3Ryb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# ── Google OAuth ───────────────────────────────────────────────────
app.google.client-id=${APP_GOOGLE_CLIENT_ID:481397534301-3r9dl62f6m2ij565i79463d5276ig2oh.apps.googleusercontent.com}

# ── CORS ───────────────────────────────────────────────────────────
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# ── Logging ────────────────────────────────────────────────────────
logging.level.com.example.quantity_measurement=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# ── Swagger ────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always