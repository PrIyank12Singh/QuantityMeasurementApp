spring.application.name=discovery-service
server.port=${PORT:8761}

eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME:${EUREKA_HOSTNAME:localhost}}
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
# Use the protocol-aware construction
eureka.client.service-url.defaultZone=${EUREKA_URL:http://${eureka.instance.hostname}:${server.port}/eureka/}

# ── Eureka Server Configuration ────────────────────────────────────
eureka.server.wait-time-in-ms-when-sync-empty=0
eureka.server.response-cache-auto-expiration-in-seconds=60
eureka.server.response-cache-update-interval-ms=30000
eureka.server.enable-self-preservation=true
eureka.server.renewal-percent-threshold=0.85

# ── Actuator ───────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
